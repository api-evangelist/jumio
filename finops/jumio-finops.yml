specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Jumio
providerId: jumio
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - KYC
  - Identity Verification
  - Biometrics
  - AML
  - Fraud Prevention
  - KYX
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps for Jumio. The dominant cost is per-verification consumption
  against the contracted KYX Platform plan, with optional add-on lines per AML
  screening lookup, ongoing-monitoring identity-month, risk-signals lookup, and
  extended-retention or retrieval. The SDKs (web, iOS, Android, React Native, Flutter,
  Cordova, Java, .NET) are free; cost begins when a backend transaction is created.
  Most contracts include a minimum monthly commit. Specific per-verification rates and
  the commit floor are negotiated and not published, so this artifact stays
  reconciled:false until paired with a real customer contract.
sources:
  - https://www.jumio.com/products/
  - https://documentation.jumio.ai/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Jumio Corporation
serviceCategory: Identity Verification
billingModel:
  pricingCategory: Per-Verification (Custom-Quoted) + Add-Ons
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Tax
    - Credit
focusColumns:
  ServiceName: Jumio KYX Platform
  ServiceCategory: Identity Verification
  ProviderName: Jumio
  PublisherName: Jumio Corporation
  InvoiceIssuerName: Jumio Corporation
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: id_verification
    description: >-
      Per-completed ID Verification transaction. Drives the bulk of usage cost.
    unit: verification
    aggregation: sum
    dimensions:
      - account_id
      - product_workflow
      - country
  - name: document_verification
    description: >-
      Per Document Verification (proof-of-address, supporting documents) transaction.
    unit: verification
    aggregation: sum
    dimensions:
      - account_id
      - document_type
  - name: authentication
    description: >-
      Per biometric authentication / selfie reverification (selfie.DONE, Authentication
      product).
    unit: authentication
    aggregation: sum
    dimensions:
      - account_id
      - product_workflow
  - name: screening
    description: >-
      Per AML / sanctions / PEP / adverse-media screening lookup.
    unit: screening
    aggregation: sum
    dimensions:
      - account_id
      - watchlist_set
  - name: ongoing_monitoring
    description: >-
      Per-identity-per-month subscription for ongoing AML monitoring.
    unit: monitored_identity_month
    aggregation: sum
    dimensions:
      - account_id
  - name: risk_signals
    description: >-
      Per Risk Signals lookup against the Identity Graph / device / behavioural data.
    unit: lookup
    aggregation: sum
    dimensions:
      - account_id
  - name: retention_extended
    description: >-
      Subscription line for extended Retrieval / data-retention windows beyond the
      default term.
    unit: month
    aggregation: sum
    dimensions:
      - account_id
  - name: minimum_commit
    description: >-
      Monthly minimum commit; whichever is greater (commit or actual usage) is billed.
    unit: month
    aggregation: max
    dimensions:
      - account_id
principles:
  - name: Visibility
    description: >-
      Pull the Jumio dashboard usage report and reconcile against the per-product
      meters. Use callback events and the Retrieval API to confirm verification
      lifecycle counts and avoid double-counting incomplete sessions.
  - name: Allocation
    description: >-
      Use a customerInternalReference per product or business unit so line-of-business
      attribution flows through the Jumio invoice. Separate test and production
      accounts to avoid mixing development volume with billable verifications.
  - name: Optimization
    description: >-
      Move returning users to selfie.DONE / Authentication to skip a full ID
      Verification cycle. Use Risk Signals as a pre-screen so low-risk customers skip
      full verification. Avoid creating verification transactions in test or canary
      flows that would consume the production meter. Negotiate the monthly minimum
      commit to match steady-state demand.
  - name: Accountability
    description: >-
      Assign a compliance / risk owner per Jumio account. Monitor against the monthly
      minimum commit and renegotiate add-on inclusion (Screening, Risk Signals,
      Retention) at renewal.
maintainers:
