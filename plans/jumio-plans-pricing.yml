specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Jumio
providerId: jumio
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - KYC
  - Identity Verification
  - Biometrics
  - AML
  - Fraud Prevention
  - KYX
  - Plans
description: >-
  Jumio does not publish self-serve plan pricing. Commercial terms are negotiated per
  customer and built around per-verification consumption with volume discounting,
  optional add-ons (AML/PEP screening, ongoing monitoring, document verification,
  authentication, risk signals, retrieval, extended retention), and a minimum monthly
  commitment. The SDKs (web, iOS, Android, React Native, Flutter, Cordova) are free to
  use; cost is incurred only when a transaction is created against the backend KYX
  Platform. Use `reconciled: false` until specific tier names and per-verification
  pricing are confirmed with Jumio sales for a given account.
sources:
  - https://www.jumio.com/products/
  - https://www.jumio.com/pricing/
  - https://documentation.jumio.ai/
plans:
  - id: jumio-kyx-platform
    name: Jumio KYX Platform (Custom)
    type: enterprise
    description: >-
      Custom-quoted enterprise contract covering ID Verification, Document Verification,
      Authentication, AML Screening, Risk Signals, Retrieval, and selfie.DONE on the
      shared KYX Platform. Pricing is per-verification with volume discounts and
      optional add-on lines.
    entries:
      - label: Per ID Verification
        name: id_verification
        type: metered
        metric: verification
        limit: -1
        timeFrame: usage
        unit: 1
        price: custom (volume-discounted)
        userMultiplied: false
      - label: Per Document Verification
        name: document_verification
        type: metered
        metric: verification
        limit: -1
        timeFrame: usage
        unit: 1
        price: custom
        userMultiplied: false
      - label: Per Authentication (Selfie Match)
        name: authentication
        type: metered
        metric: authentication
        limit: -1
        timeFrame: usage
        unit: 1
        price: custom
        userMultiplied: false
      - label: AML / PEP / Sanctions Screening
        name: screening
        type: metered
        metric: screening
        limit: -1
        timeFrame: usage
        unit: 1
        price: custom add-on
        userMultiplied: false
      - label: Ongoing Monitoring
        name: ongoing_monitoring
        type: metered
        metric: monitored_identity_month
        limit: -1
        timeFrame: month
        unit: 1
        price: custom add-on
        userMultiplied: false
      - label: Risk Signals
        name: risk_signals
        type: metered
        metric: lookup
        limit: -1
        timeFrame: usage
        unit: 1
        price: custom add-on
        userMultiplied: false
      - label: Retrieval / Extended Retention
        name: retention
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        unit: 1
        price: custom add-on
        userMultiplied: false
      - label: Minimum Monthly Commit
        name: minimum_commit
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: ID Verification
      - name: Document Verification
      - name: Authentication (Biometric Reverification)
      - name: selfie.DONE Reusable Identity
      - name: AML / Sanctions / PEP Screening
      - name: Adverse Media Screening
      - name: Risk Signals
      - name: Retrieval and Audit Records
      - name: Web and Mobile SDKs (Free)
      - name: Java and .NET Backend SDKs (Free)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
